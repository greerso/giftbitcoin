server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json application/manifest+json image/svg+xml;

    # Security headers. NOTE: nginx `add_header` does NOT inherit into a location
    # that declares its own `add_header`, so every location below that adds a
    # header must re-declare these three. (CSP is emitted as a <meta> by SvelteKit
    # so its per-build inline-script hash stays correct — see svelte.config.js.)
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header X-Frame-Options DENY always;

    # Long-cache fingerprinted app assets (immutable, safe to cache forever).
    location /_app/immutable/ {
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer always;
        add_header X-Frame-Options DENY always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Self-hosted fonts.
    location /fonts/ {
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer always;
        add_header X-Frame-Options DENY always;
        add_header Cache-Control "public, max-age=31536000" always;
        try_files $uri =404;
    }

    # PWA icons / favicons — cacheable, not secret-bearing.
    location /icons/ {
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer always;
        add_header X-Frame-Options DENY always;
        add_header Cache-Control "public, max-age=604800" always;
        try_files $uri =404;
    }

    # Web app manifest — correct MIME so Chromium treats it as installable.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer always;
        add_header X-Frame-Options DENY always;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # SPA: serve a prerendered route shell if present, else the 200.html fallback.
    # HTML (including the secret-bearing /c claim shell) must never be cached.
    location / {
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer always;
        add_header X-Frame-Options DENY always;
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri.html $uri/ /200.html;
    }
}
