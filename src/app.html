<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#C97210" />
		<meta name="color-scheme" content="light" />
		<meta
			name="description"
			content="Non-custodial Bitcoin e-gift cards. Create a gift, share a link, redeem to a wallet you control."
		/>
		<meta name="application-name" content="Gift Bitcoin" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="GiftBitcoin" />
		<!-- Static OG/Twitter for crawlers (no JS). Absolute icon only — never claim fragments. -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Gift Bitcoin" />
		<meta property="og:title" content="Gift Bitcoin — e-gift cards that are real bitcoin" />
		<meta
			property="og:description"
			content="Non-custodial Bitcoin e-gift cards. Create a gift, share a link, redeem to a wallet you control."
		/>
		<meta property="og:url" content="https://giftbitcoin.app" />
		<meta property="og:image" content="https://giftbitcoin.app/icons/icon-512.png" />
		<meta property="og:image:width" content="512" />
		<meta property="og:image:height" content="512" />
		<meta property="og:image:alt" content="Gift Bitcoin app icon" />
		<meta name="twitter:card" content="summary" />
		<meta name="twitter:title" content="Gift Bitcoin — e-gift cards that are real bitcoin" />
		<meta
			name="twitter:description"
			content="Non-custodial Bitcoin e-gift cards. Create a gift, share a link, redeem to a wallet you control."
		/>
		<meta name="twitter:image" content="https://giftbitcoin.app/icons/icon-512.png" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32" />
		<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
		<link rel="stylesheet" href="/fonts/fonts.css" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
